# Set true color
set-option -sa terminal-overrides ",xterm*Tc"
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-window on

# Set color theme
set -g @plugin 'egel/tmux-gruvbox'
set -g @tmux-gruvbox 'dark' # or 'light'

# Set prefix
# unbind C-b
# set -g prefix C-Space
# bind C-Space send-prefix

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
# save/resotre sessions
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
# settings 
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'on'
set -g @continuum-save-interval '5'

# bind-key S run-shell '~/.tmux/plugins/tmux-resurrect/scripts/save.sh'  ; display "sessions stored!"
# bind-key R run-shell '~/.tmux/plugins/tmux-resurrect/scripts/restore.sh' ; display "sessions restored!"

# set vi-mode
set-window-option -g mode-keys vi
#keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and cancel

# Open panes in current directory
# bind '"' split-window -v -c "#{pane_curent_path}"
# bind % split-window -h -c "#{pane_curent_path}"

run '~/.tmux/plugins/tpm/tpm'
